spring.datasource.url=jdbc:h2:mem:eventdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Disable SQL script initializer (DataInitializer.java handles seeding)
spring.sql.init.mode=never

# JWT Secret
jwt.secret=eventHubSuperSecretKey2026ForJWT!!

# Razorpay Test Keys
# IMPORTANT: Replace these with your actual test keys from the Razorpay Dashboard
razorpay.key.id=rzp_test_YourTestKeyIdHere
razorpay.key.secret=YourTestKeySecretHere

# Firebase Configuration
# Path to the Firebase service account JSON file
firebase.config.path=classpath:firebase-service-account.json
