<!DOCTYPE html>
<html>
<head>
    <title>Transaction-Based Payment Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            background: white;
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            color: #333;
        }

        .balance {
            font-size: 18px;
            margin: 10px 0;
        }

        input {
            padding: 8px;
            width: 80%;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }

        .message {
            margin-top: 15px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Online Payment Simulation</h2>

    <div class="balance">
        User Balance: ₹<span id="userBalance">1000</span>
    </div>

    <div class="balance">
        Merchant Balance: ₹<span id="merchantBalance">500</span>
    </div>

    <input type="number" id="amount" placeholder="Enter Amount">

    <br>

    <button onclick="makePayment()">Pay Now</button>

    <div class="message" id="message"></div>
</div>

<script>
    let userBalance = 1000;
    let merchantBalance = 500;

    function makePayment() {
        let amount = parseInt(document.getElementById("amount").value);
        let message = document.getElementById("message");

        if (isNaN(amount) || amount <= 0) {
            message.innerHTML = "Enter valid amount!";
            message.className = "message error";
            return;
        }

        // Check balance
        if (amount <= userBalance) {
            // COMMIT (Success)
            userBalance -= amount;
            merchantBalance += amount;

            document.getElementById("userBalance").innerHTML = userBalance;
            document.getElementById("merchantBalance").innerHTML = merchantBalance;

            message.innerHTML = "Payment Successful! (COMMIT)";
            message.className = "message success";
        } else {
            // ROLLBACK (Failure)
            message.innerHTML = "Payment Failed! Insufficient Balance (ROLLBACK)";
            message.className = "message error";
        }
    }
</script>

</body>
</html>
