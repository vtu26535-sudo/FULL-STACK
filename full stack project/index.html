<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #3498db;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

<header>📦 Inventory Control System</header>

<div class="container">

    <div class="card">
        <h3>Add Product</h3>
        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="quantity" placeholder="Quantity">
        <input type="number" id="price" placeholder="Price">
        <button onclick="addProduct()">Add Product</button>
    </div>

    <div class="card">
        <h3>Stock Management</h3>
        <input type="number" id="pid" placeholder="Product ID">
        <input type="number" id="qty" placeholder="Quantity">
        <select id="type">
            <option value="IN">Stock IN</option>
            <option value="OUT">Stock OUT</option>
        </select>
        <button onclick="updateStock()">Update Stock</button>
    </div>

    <div class="card">
        <h3>Product List</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>

const baseUrl = "http://localhost:8080/products";

function loadProducts() {
    fetch(baseUrl)
    .then(res => res.json())
    .then(data => {
        let body = document.getElementById("tableBody");
        body.innerHTML = "";
        data.forEach(p => {
            body.innerHTML += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.quantity}</td>
                    <td>${p.price}</td>
                </tr>`;
        });
    });
}

function addProduct() {
    let product = {
        name: document.getElementById("name").value,
        quantity: document.getElementById("quantity").value,
        price: document.getElementById("price").value
    };

    fetch(baseUrl, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(product)
    }).then(() => loadProducts());
}

function updateStock() {
    let id = document.getElementById("pid").value;
    let qty = document.getElementById("qty").value;
    let type = document.getElementById("type").value;

    fetch(`${baseUrl}/stock?productId=${id}&quantity=${qty}&type=${type}`, {
        method: "POST"
    }).then(() => loadProducts());
}

loadProducts();

</script>

</body>
</html>
